<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password | Fresha Jobs</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/pages.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body data-page="auth">
  <div class="auth-page">
    <div class="auth-visual">
      <h2>Reset Your Password</h2>
      <p>Don't worry, it happens to the best of us. We'll help you get back into your account.</p>
    </div>
    <div class="auth-form-container">
      <div class="auth-form-wrapper">
        <a href="index.html" class="logo"><div class="logo-icon">F</div><span>Fresha Jobs</span></a>
        <h1>Forgot Password</h1>
        <p>Enter your email and we'll send you a reset link</p>

        <form id="forgot-form">
          <div class="form-group floating">
            <input type="email" id="email" class="form-control" placeholder=" " required autocomplete="email">
            <label for="email">Email Address</label>
          </div>
          <button type="submit" class="btn btn-primary" style="width:100%">Send Reset Link</button>
        </form>

        <p class="auth-footer"><a href="login.html">← Back to Log In</a></p>
      </div>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
